<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCalendar - 資金繰り管理ソフト</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1rem; opacity: 0.95; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .card-icon { font-size: 3rem; margin-bottom: 15px; }
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .card-description { color: #666; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.6; }
        .card-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
        .trial .card-badge { background: #fff3e0; color: #f77f00; }
        .viewer .card-badge { background: #e8f5e9; color: #27ae60; }
        .product .card-badge { background: #e3f2fd; color: #2196f3; }
        .trial { border-top: 4px solid #f77f00; }
        .viewer { border-top: 4px solid #27ae60; }
        .product { border-top: 4px solid #2196f3; }
        .footer { text-align: center; color: white; opacity: 0.9; margin-top: 30px; }
        .footer a { color: white; text-decoration: underline; margin: 0 10px; }
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 CashCalendar</h1>
            <p>あなたのビジネスの資金繰りを見える化する</p>
        </div>
        <div class="cards">
            <a href="./trial/" class="card trial">
                <div class="card-icon">🧪</div>
                <div class="card-title">体験版</div>
                <div class="card-description">すべての機能を5件まで無料体験<br>編集・保存可能</div>
                <div class="card-badge">無料ダウンロード</div>
            </a>
            <a href="./viewer/" class="card viewer">
                <div class="card-icon">👁️</div>
                <div class="card-title">閲覧版</div>
                <div class="card-description">データの確認・グラフ表示専用<br>編集・保存は不可</div>
                <div class="card-badge">無料ダウンロード</div>
            </a>
            <a href="https://lin.ee/YOUR_LINE_ID" class="card product">
                <div class="card-icon">💎</div>
                <div class="card-title">製品版</div>
                <div class="card-description">無制限のデータ入力<br>全機能 + LINEサポート</div>
                <div class="card-badge">¥26,500（税込）</div>
            </a>
        </div>
        <div class="footer">
            <p>
                <a href="https://lin.ee/YOUR_LINE_ID">📱 LINEサポート</a> |
                <a href="#faq">❓ よくある質問</a> |
                <a href="#manual">📖 使い方ガイド</a>
            </p>
            <p style="margin-top: 15px; font-size: 0.9rem;">© 2026 CashCalendar. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
